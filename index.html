<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="home_title">Chess Data Stats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1 data-i18n="home_title">Chess Data Stats</h1>
        <p class="hint" data-i18n="home_hint">Add one or more usernames and choose a date range (max 120 days).</p>
        <div class="row import-row">
          <label for="platform" data-i18n="home_platform">Platform</label>
          <select id="platform" name="platform">
            <option value="lichess">Lichess</option>
            <option value="chesscom" selected>Chess.com</option>
          </select>
        </div>
        <div class="row import-row">
          <label for="range-days" data-i18n="home_range">Range (days)</label>
          <input id="range-days" name="range-days" type="number" min="1" max="120" step="1" value="30" />
          <span class="hint-inline" data-i18n="home_default_mode">Default mode</span>
        </div>
        <details class="date-override">
          <summary data-i18n="home_optional_exact_range">Optional: exact date range</summary>
          <div class="row import-row">
            <label for="date-from" data-i18n="home_from">From</label>
            <input id="date-from" name="date-from" type="date" />
          </div>
          <div class="row import-row">
            <label for="date-to" data-i18n="home_to">To</label>
            <input id="date-to" name="date-to" type="date" />
          </div>
          <p class="hint-inline" data-i18n="home_date_override_hint">If both dates are set, they override Range.</p>
        </details>
        <div class="row import-row">
          <span data-i18n="home_game_types">Game Types</span>
          <div class="type-options">
            <label><input type="checkbox" name="game-type" value="bullet" checked /> <span data-i18n="home_bullet">Bullet</span></label>
            <label><input type="checkbox" name="game-type" value="blitz" checked /> <span data-i18n="home_blitz">Blitz</span></label>
            <label><input type="checkbox" name="game-type" value="rapid" checked /> <span data-i18n="home_rapid">Rapid</span></label>
          </div>
        </div>

        <form id="add-user-form" class="row">
          <label for="username" class="sr-only">Lichess Username</label>
          <input id="username" name="username" type="text" placeholder="e.g. MagnusCalsen" autocomplete="off" required />
          <button type="submit" data-i18n="home_add">Add</button>
        </form>
        <div class="row import-row">
          <button id="upload-csv" type="button" data-i18n="home_upload_csv">Upload CSV</button>
          <input id="csv-file" type="file" accept=".csv,text/csv" class="sr-only" />
          <span class="hint-inline" data-i18n="home_csv_hint">CSV: one username per line or comma-separated.</span>
        </div>

        <ul id="user-list" class="user-list" aria-live="polite"></ul>

        <div class="actions">
          <button id="build-page" type="button" data-i18n="home_generate">Generate Stats Page</button>
        </div>
      </section>
    </main>

    <script src="language.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
