<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lichess Multi-User Stats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>Lichess Account Stats</h1>
        <p class="hint">Add one or more usernames and choose a range (max 90 days).</p>
        <div class="row import-row">
          <label for="platform">Platform</label>
          <select id="platform" name="platform">
            <option value="lichess" selected>Lichess</option>
            <option value="chesscom">Chess.com</option>
          </select>
        </div>
        <div class="row import-row">
          <label for="range-days">Range (days)</label>
          <input id="range-days" name="range-days" type="number" min="1" max="90" step="1" value="30" />
        </div>
        <div class="row import-row">
          <span>Game Types</span>
          <div class="type-options">
            <label><input type="checkbox" name="game-type" value="bullet" checked /> Bullet</label>
            <label><input type="checkbox" name="game-type" value="blitz" checked /> Blitz</label>
            <label><input type="checkbox" name="game-type" value="rapid" checked /> Rapid</label>
          </div>
        </div>

        <form id="add-user-form" class="row">
          <label for="username" class="sr-only">Lichess Username</label>
          <input id="username" name="username" type="text" placeholder="e.g. DrNykterstein" autocomplete="off" required />
          <button type="submit">Add</button>
        </form>
        <div class="row import-row">
          <button id="upload-csv" type="button">Upload CSV</button>
          <input id="csv-file" type="file" accept=".csv,text/csv" class="sr-only" />
          <span class="hint-inline">CSV: one username per line or comma-separated.</span>
        </div>

        <ul id="user-list" class="user-list" aria-live="polite"></ul>

        <div class="actions">
          <button id="build-page" type="button">Generate Stats Page</button>
        </div>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
