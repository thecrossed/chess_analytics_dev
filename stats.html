<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="stats_title">Game Stats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card wide">
        <div class="actions">
          <small id="auth-user" class="hint-inline"></small>
          <button id="logout-btn" type="button" data-i18n="nav_logout">Log Out</button>
        </div>
        <h1 data-i18n="stats_title">Game Stats</h1>
        <p id="summary" class="hint" data-i18n="stats_loading">Loading data...</p>
        <div id="loading" class="loading" role="status" aria-live="polite">
          <span class="spinner" aria-hidden="true"></span>
          <span data-i18n="stats_loading">Loading data...</span>
        </div>

        <div id="stats-table-wrap" class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="stats_username">Username</th>
                <th data-i18n="stats_games">Games</th>
                <th data-i18n="stats_breakdown">Breakdown</th>
                <th data-i18n="stats_win_rate">Win Rate</th>
                <th data-i18n="stats_avg_duration">Avg Game Duration</th>
                <th data-i18n="stats_rating_change">Rating Change (Range)</th>
                <th data-i18n="stats_last_played">Last Played</th>
              </tr>
            </thead>
            <tbody id="stats-body"></tbody>
          </table>
        </div>

        <div class="actions">
          <button id="download-csv" type="button" disabled data-i18n="stats_download_csv">Download CSV</button>
          <button id="download-raw-csv" type="button" disabled data-i18n="stats_download_raw">Download Raw Data</button>
          <a class="button-link" href="index.html" data-i18n="nav_back_home">Back to Home</a>
        </div>
      </section>
    </main>

    <script src="language.js"></script>
    <script src="stats.js" type="module"></script>
  </body>
</html>
