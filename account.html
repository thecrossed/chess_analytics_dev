<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="account_title">Account - Chess Analytics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" style="max-width: 520px;">
        <h1 data-i18n="account_title">Account</h1>
        <p class="hint" data-i18n="account_hint">Set or update your email for password reset.</p>
        <div id="account-message" class="hint" aria-live="polite"></div>

        <form id="email-form" class="stack-form">
          <label for="email" data-i18n="account_email">Email</label>
          <input id="email" type="email" autocomplete="email" required />
          <button type="submit" data-i18n="account_save">Save Email</button>
        </form>

        <div class="small-links">
          <a href="index.html" data-i18n="nav_back_home">Back to Home</a>
        </div>
      </section>
    </main>

    <script src="language.js"></script>
    <script src="account.js" type="module"></script>
  </body>
</html>
