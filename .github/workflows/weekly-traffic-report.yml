name: Weekly Traffic Report

on:
  schedule:
    - cron: "10 0 * * 1"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly report endpoint
        env:
          DAILY_REPORT_ENDPOINT: ${{ secrets.DAILY_REPORT_ENDPOINT }}
          DAILY_REPORT_TOKEN: ${{ secrets.DAILY_REPORT_TOKEN }}
        run: |
          if [ -z "$DAILY_REPORT_ENDPOINT" ] || [ -z "$DAILY_REPORT_TOKEN" ]; then
            echo "Missing DAILY_REPORT_ENDPOINT or DAILY_REPORT_TOKEN secret."
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl --show-error --silent \
              --output "$response_file" \
              --write-out "%{http_code}" \
              -X POST "$DAILY_REPORT_ENDPOINT" \
              -H "X-Admin-Token: $DAILY_REPORT_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"period":"weekly"}'
          )"
          echo "HTTP $http_code"
          cat "$response_file"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
