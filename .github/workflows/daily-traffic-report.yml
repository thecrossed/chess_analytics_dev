name: Daily Traffic Report

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily report endpoint
        env:
          DAILY_REPORT_ENDPOINT: ${{ secrets.DAILY_REPORT_ENDPOINT }}
          DAILY_REPORT_TOKEN: ${{ secrets.DAILY_REPORT_TOKEN }}
        run: |
          if [ -z "$DAILY_REPORT_ENDPOINT" ] || [ -z "$DAILY_REPORT_TOKEN" ]; then
            echo "Missing DAILY_REPORT_ENDPOINT or DAILY_REPORT_TOKEN secret."
            exit 1
          fi

          response_file="$(mktemp)"
          health_url="${DAILY_REPORT_ENDPOINT%/}"
          health_url="${health_url%/api/admin/daily-report}/health"
          echo "Endpoint health:"
          curl --show-error --silent "$health_url" || true
          echo

          http_code="$(
            curl --show-error --silent \
              --retry 3 \
              --retry-delay 10 \
              --retry-connrefused \
              --output "$response_file" \
              --write-out "%{http_code}" \
              -X POST "$DAILY_REPORT_ENDPOINT" \
              -H "X-Admin-Token: $DAILY_REPORT_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"period":"daily"}'
          )"
          echo "HTTP $http_code"
          cat "$response_file"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            if grep -q '"email_send_failed"' "$response_file" && ! grep -q '"reason"' "$response_file"; then
              echo
              echo "The report endpoint returned the old email_send_failed shape without a reason."
              echo "Check that DAILY_REPORT_ENDPOINT points to the deployment running the latest main commit."
            fi
            exit 1
          fi
