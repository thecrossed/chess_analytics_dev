<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Chess Analytics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" style="max-width: 520px;">
        <h1>Forgot Password</h1>
        <p class="hint">Request a reset email, then set a new password.</p>

        <div id="auth-message" class="hint" aria-live="polite"></div>

        <form id="reset-request-form" class="stack-form">
          <label for="reset-request-username">Username</label>
          <input id="reset-request-username" type="text" autocomplete="username" required />
          <button type="submit">Request Reset Email</button>
        </form>

        <hr />

        <form id="reset-confirm-form" class="stack-form">
          <label for="reset-token">Reset Token</label>
          <input id="reset-token" type="text" autocomplete="off" required />
          <label for="reset-new-password">New Password (min 12, upper/lower/number/symbol)</label>
          <input id="reset-new-password" type="password" autocomplete="new-password" required />
          <button type="submit">Reset Password</button>
        </form>

        <div class="small-links">
          <a href="login.html">Back to Login</a>
        </div>
      </section>
    </main>

    <script src="forgot-password.js" type="module"></script>
  </body>
</html>
