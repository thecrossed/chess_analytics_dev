<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="stats_raw_preview">Raw Data Preview</title>
    <meta
      name="description"
      content="Preview raw chess game data, inspect game-level details, and download selected games as CSV."
    />
    <link rel="canonical" href="https://chess-data.com/raw-data.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Raw Data Preview | Chess Data Stats" />
    <meta
      property="og:description"
      content="Preview raw chess game data, inspect game-level details, and download selected games as CSV."
    />
    <meta property="og:url" content="https://chess-data.com/raw-data.html" />
    <meta property="og:site_name" content="Chess Data Stats" />
    <meta property="og:image" content="https://chess-data.com/assets/og-default.svg" />
    <meta property="og:image:alt" content="Chess Data Stats raw data preview page" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Raw Data Preview | Chess Data Stats" />
    <meta
      name="twitter:description"
      content="Preview raw chess game data, inspect game-level details, and download selected games as CSV."
    />
    <meta name="twitter:image" content="https://chess-data.com/assets/og-default.svg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Raw Data Preview",
        "url": "https://chess-data.com/raw-data.html",
        "description": "Preview raw chess game data, inspect game-level details, and download selected games as CSV."
      }
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="raw-shell">
      <section class="card wide raw-card">
        <h1 data-i18n="stats_raw_preview">Raw Data Preview</h1>
        <p id="raw-summary" class="hint" data-i18n="stats_loading">Loading data...</p>

        <div id="raw-table-wrap" class="table-wrap scrollable-rows raw-table-wrap">
          <table>
            <thead>
              <tr>
                <th class="raw-select-header">
                  <input id="raw-select-all" type="checkbox" checked aria-label="Select all games" />
                </th>
                <th data-i18n="stats_username">Username</th>
                <th data-i18n="stats_raw_white_player">White Player</th>
                <th data-i18n="stats_raw_white_rating">White Rating</th>
                <th data-i18n="stats_raw_black_player">Black Player</th>
                <th data-i18n="stats_raw_black_rating">Black Rating</th>
                <th data-i18n="stats_raw_rating_gap">Rating Gap</th>
                <th data-i18n="stats_raw_game_type">Game Type</th>
                <th data-i18n="stats_raw_result">Result</th>
                <th data-i18n="stats_raw_game_link">Game Link</th>
                <th data-i18n="stats_raw_played_at">Played At (UTC)</th>
                <th data-i18n="stats_raw_duration_min">Duration (min)</th>
                <th data-i18n="stats_raw_rating_diff">Rating Diff</th>
              </tr>
            </thead>
            <tbody id="raw-body"></tbody>
          </table>
        </div>

        <div class="actions">
          <button id="raw-prev-page" type="button" data-i18n="raw_prev_page">Previous</button>
          <small id="raw-page-info" class="hint-inline">Page 1/1</small>
          <button id="raw-next-page" type="button" data-i18n="raw_next_page">Next</button>
        </div>

        <div class="actions">
          <button id="open-selected-pgn-page" type="button" disabled data-i18n="stats_open_selected_pgn_page">Open Selected PGN Analysis Page</button>
          <button id="download-raw-csv" type="button" disabled data-i18n="stats_download_raw">Download Raw Data</button>
          <a id="back-stats-link" class="button-link" href="stats.html" data-i18n="nav_back_stats">Back to Game Stats</a>
          <a class="button-link" href="index.html" data-i18n="nav_back_home">Back to Home</a>
        </div>
      </section>
    </main>

    <script src="language.js"></script>
    <script src="cookie-consent.js"></script>
    <script src="raw-data.js" type="module"></script>
  </body>
</html>
