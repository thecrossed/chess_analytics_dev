<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Chess Analytics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" style="max-width: 520px;">
        <h1>User Login</h1>
        <p class="hint">Sign in to use the analytics dashboard.</p>

        <div id="auth-message" class="hint" aria-live="polite"></div>

        <form id="login-form" class="stack-form">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" autocomplete="username" required />
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
          <button type="submit">Log In</button>
        </form>

        <div class="actions" style="margin-top: 10px; justify-content: flex-start;">
          <button id="guest-login-btn" type="button">Login as Guest</button>
        </div>

        <div class="small-links">
          <a href="register.html">Create Account</a>
          <a href="forgot-password.html">Forgot Password?</a>
        </div>
      </section>
    </main>

    <script src="login.js" type="module"></script>
  </body>
</html>
