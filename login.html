<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="login_title">Login - Chess Analytics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" style="max-width: 520px;">
        <h1 data-i18n="login_title">User Login</h1>
        <p class="hint" data-i18n="login_hint">Sign in to use the analytics dashboard.</p>

        <div id="auth-message" class="hint" aria-live="polite"></div>

        <form id="login-form" class="stack-form">
          <label for="login-username" data-i18n="login_username">Username</label>
          <input id="login-username" type="text" autocomplete="username" required />
          <label for="login-password" data-i18n="login_password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
          <button type="submit" data-i18n="login_button">Log In</button>
        </form>

        <div class="actions" style="margin-top: 10px; justify-content: flex-start;">
          <button id="guest-login-btn" type="button" data-i18n="login_guest">Login as Guest</button>
        </div>

        <div class="small-links">
          <a href="register.html" data-i18n="login_create_account">Create Account</a>
          <a href="forgot-password.html" data-i18n="login_forgot_password">Forgot Password?</a>
          <a href="support.html" data-i18n="nav_support">Support</a>
        </div>
      </section>
    </main>

    <script src="language.js"></script>
    <script src="login.js" type="module"></script>
  </body>
</html>
